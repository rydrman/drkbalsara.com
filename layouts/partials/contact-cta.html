<aside class="cta" aria-labelledby="cta-heading">
  <div class="container cta__inner">
    <h2 id="cta-heading" class="cta__title">When you&rsquo;re ready, I&rsquo;m here.</h2>
    <p class="cta__lede">{{ site.Params.hours }}. Serving Vancouver and the Lower Mainland.</p>
    <div class="cta__buttons">
      <a class="btn btn--primary" href="tel:{{ site.Params.phone }}">Call {{ site.Params.phoneDisplay }}</a>
      <a class="btn btn--ghost" href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
    </div>
  </div>
</aside>
