{{ define "main" }}
  <section class="container prose">
    <header class="prose__header">
      <h1>{{ .Title }}</h1>
      {{ with .Params.lede }}<p class="prose__lede">{{ . }}</p>{{ end }}
    </header>
    <div class="prose__body">
      {{ .Content }}
    </div>
    {{ with .Pages }}
      <ul class="card-grid" role="list">
        {{ range . }}
          <li class="card">
            <a class="card__link" href="{{ .RelPermalink }}">
              <h2 class="card__title">{{ .Title }}</h2>
              {{ with .Params.description }}<p class="card__desc">{{ . }}</p>{{ end }}
              <span class="card__more" aria-hidden="true">Learn more &rarr;</span>
            </a>
          </li>
        {{ end }}
      </ul>
    {{ end }}
    {{ partial "contact-cta.html" . }}
  </section>
{{ end }}
