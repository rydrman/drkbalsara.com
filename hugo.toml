baseURL = "https://drkbalsara.com/"
defaultContentLanguage = "en"
title = "Dr. Balsara — Compassionate At-Home Pet Euthanasia in Vancouver"
enableRobotsTXT = true
# enableGitInfo = true   # turn on after the first commit; needs Git history to work.
enableEmoji = false
# Disable unused taxonomies (no blog yet — keeps sitemap clean).
disableKinds = ["taxonomy", "term"]

# Sitemap + RSS via Hugo defaults; we don't ship a custom JSON index.
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[languages]
  [languages.en]
    label = "English"
    locale = "en-CA"
    weight = 1

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false
  disableJSON = false
  disableSVG = true
  disableXML = false
  minifyOutput = true
  [minify.tdewolff.html]
    keepDocumentTags = true
    keepEndTags = true
    keepQuotes = true

[taxonomies]

[markup]
  [markup.goldmark.renderer]
    unsafe = false
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[imaging]
  resampleFilter = "Lanczos"
  quality = 82
  hint = "photo"

[params]
  description = "Dr. Balsara provides gentle, in-home pet euthanasia and end-of-life care across Vancouver and the Lower Mainland. Compassionate, unhurried goodbyes in the comfort of home."
  author = "Dr. Balsara"
  # Brand
  brand = "Dr. Balsara"
  tagline = "Compassionate at-home pet euthanasia in Vancouver and the Lower Mainland"
  # Contact
  phone = "+14165650477"
  phoneDisplay = "+1 416-565-0477"
  email = "drkbalsara@gmail.com"
  hours = "By appointment, 7 days a week"
  # Geo (Vancouver, BC, Canada)
  geoRegion = "CA-BC"
  geoPlacename = "Vancouver, British Columbia, Canada"
  latitude = "49.2827"
  longitude = "-123.1207"
  priceRange = "$$"
  themeColor = "#5b6b54"
  twitterHandle = ""
  # Social / link-preview image (1200×630 recommended); also used for LocalBusiness schema
  ogImage = "/og-image.jpg"
  ogImageAlt = "Dr. Balsara — compassionate at-home pet euthanasia in Vancouver and the Lower Mainland"
  # Service areas (used for areaServed JSON-LD and footer/section listing)
  serviceAreas = [
    "Vancouver",
    "Burnaby",
    "Richmond",
    "North Vancouver",
    "West Vancouver",
    "Coquitlam",
    "New Westminster",
    "Port Moody",
  ]

[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]

[build]
  writeStats = false

[caches]
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = -1
